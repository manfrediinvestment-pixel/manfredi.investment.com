name: Deploy Calendario Worker

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'workers/calendario/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Calendario Worker
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install -g wrangler@latest

      - name: Get or create KV namespace and deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          set -e
          
          # Get list of KV namespaces
          echo "Fetching KV namespaces..."
          KV_LIST=$(wrangler kv namespace list --json 2>/dev/null || echo "[]")
          echo "KV list: $KV_LIST"
          
          # Look for existing namespace named 'manfredi-calendario-CALENDARIO_KV'
          KV_ID=$(echo "$KV_LIST" | node -e "
            const d = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
            const ns = d.find(x => x.title === 'manfredi-calendario-CALENDARIO_KV');
            process.stdout.write(ns ? ns.id : '');
          " 2>/dev/null || echo "")
          
          if [ -z "$KV_ID" ]; then
            echo "Creating new KV namespace CALENDARIO_KV..."
            CREATE_OUTPUT=$(wrangler kv namespace create CALENDARIO_KV --json 2>&1)
            echo "Create output: $CREATE_OUTPUT"
            KV_ID=$(echo "$CREATE_OUTPUT" | node -e "
              const lines = require('fs').readFileSync('/dev/stdin','utf8').split('\n');
              for (const line of lines) {
                try {
                  const d = JSON.parse(line);
                  if (d.id) { process.stdout.write(d.id); break; }
                } catch(e) {}
              }
            " 2>/dev/null || echo "")
          fi
          
          echo "Using KV namespace ID: $KV_ID"
          
          if [ -z "$KV_ID" ]; then
            echo "ERROR: Could not get or create KV namespace ID"
            exit 1
          fi
          
          # Update wrangler.toml with the real KV ID
          sed -i "s/REEMPLAZAR_CON_ID_REAL_DEL_KV/$KV_ID/" workers/calendario/wrangler.toml
          echo "Updated wrangler.toml:"
          cat workers/calendario/wrangler.toml
          
          # Deploy
          echo "Deploying worker..."
          wrangler deploy --config workers/calendario/wrangler.toml
