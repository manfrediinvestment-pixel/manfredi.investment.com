name: Deploy Calendario Worker

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'workers/calendario/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Calendario Worker
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Wrangler
        run: npm install -g wrangler@latest

      - name: Create or get KV namespace ID
        id: kv
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          # Try to get existing KV namespace
          KV_LIST=$(wrangler kv namespace list 2>/dev/null || echo "[]")
          KV_ID=$(echo "$KV_LIST" | python3 -c "import sys,json; ns=[x for x in json.load(sys.stdin) if x['title']=='manfredi-calendario-CALENDARIO_KV']; print(ns[0]['id'] if ns else '')" 2>/dev/null || echo "")
          
          if [ -z "$KV_ID" ]; then
            echo "Creating KV namespace..."
            KV_CREATE=$(wrangler kv namespace create CALENDARIO_KV 2>&1)
            echo "$KV_CREATE"
            KV_ID=$(echo "$KV_CREATE" | grep -oP '(?<="id": ")[^"]+' | head -1)
          fi
          
          echo "KV_ID=$KV_ID" >> $GITHUB_OUTPUT
          echo "KV namespace ID: $KV_ID"

      - name: Update wrangler.toml with KV ID
        run: |
          sed -i 's/REEMPLAZAR_CON_ID_REAL_DEL_KV/${{ steps.kv.outputs.KV_ID }}/' workers/calendario/wrangler.toml
          cat workers/calendario/wrangler.toml

      - name: Deploy with Wrangler
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          wrangler deploy --config workers/calendario/wrangler.toml
