name: Deploy Noticias Worker

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths: ['workers/noticias/**']

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy Noticias Worker
    steps:
      - uses: actions/checkout@v4
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy --config workers/noticias/wrangler.toml
