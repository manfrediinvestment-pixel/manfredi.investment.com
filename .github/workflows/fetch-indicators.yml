name: Fetch Technical Indicators

on:
  schedule:
    - cron: '0 14 * * 1-5'   # Lunes a viernes 14:00 UTC (después del market open)
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract tickers from MI_ASSETS
        id: tickers
        run: |
          TICKERS=$(node -e "
            const fs = require('fs');
            const html = fs.readFileSync('index.html', 'utf8');
            const idx = html.indexOf('const MI_ASSETS={');
            if (idx === -1) { console.log('[]'); process.exit(0); }
            const brace = html.indexOf('{', idx);
            let depth = 0, i = brace;
            while (i < html.length) {
              if (html[i] === '{') depth++;
              else if (html[i] === '}') { depth--; if (depth === 0) break; }
              i++;
            }
            const objStr = html.slice(brace, i+1);
            const keys = [];
            const re = /([A-Z0-9\.]+):\{/g;
            let m;
            while ((m = re.exec(objStr)) !== null) keys.push(m[1]);
            console.log(JSON.stringify(keys));
          ")
          echo "list=$TICKERS" >> $GITHUB_OUTPUT

      - name: Fetch indicators
        env:
          AV_API_KEY: ${{ secrets.AV_API_KEY }}
          MI_TICKERS: ${{ steps.tickers.outputs.list }}
        run: node scripts/fetch-indicators.js

      - name: Commit JSON files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/indicators/
          git diff --staged --quiet || git commit -m "chore: update technical indicators [skip ci]"
          git push
