name: Reportes Diarios

on:
  schedule:
    - cron: '0 13 * * 1-5'
  workflow_dispatch:

jobs:
  update-reports:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generar reportes
        run: python update_reports.py

      - name: Commit y push de reportes
        run: |
          git config --global user.name "Manfredi Investment Bot"
          git config --global user.email "bot@manfredinvestment.com"
          git pull --rebase origin main
          git add argentina.json wallstreet.json
          git diff --staged --quiet || git commit -m "Reportes diarios $(date +'%d/%m/%Y %H:%M')"
          git push origin main
