name: Reportes Diarios

on:
  schedule:
    - cron: '0 13 * * 1-5' # Corre a las 10:00 AM hora Argentina
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-reports:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Generate Reports
        run: npm run generate-reports # Asegurate que este script exista en tu package.json
        env:
          # Si usas alguna API de mercados, agregá la key acá como secret
          MARKET_API_KEY: ${{ secrets.MARKET_API_KEY }}

      - name: Deploy to Cloudflare Workers
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
