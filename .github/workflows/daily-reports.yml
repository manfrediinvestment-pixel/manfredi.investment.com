name: Reportes Diarios

on:
  schedule:
    - cron: '0 13 * * 1-5'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-reports:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generar reportes
        run: python update_reports.py

      - name: Push reportes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Reportes diarios $(date +'%d/%m/%Y')"
          file_pattern: "argentina.json wallstreet.json"
