name: Reportes Diarios

on:
  schedule:
    - cron: '0 13 * * 1-5' # 10:00 AM Argentina
  workflow_dispatch: # Permite correrlo a mano para probar

permissions:
  contents: write

jobs:
  run-reports:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Generate Reports
        run: python update_reports.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add reports/*.json
          git commit -m "Update daily reports [skip ci]" || echo "No changes to commit"
          git push

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name=manfrediinvestment # Reemplaza con el nombre de tu proyecto en Cloudflare
