name = "manfredi-noticias"
main = "index.js"
compatibility_date = "2026-04-19"

[vars]
SITE_URL = "https://manfredi-investment-com.pages.dev"

# Crear con: wrangler kv namespace create NOTICIAS_KV
# y reemplazar el id de abajo por el que devuelva ese comando.
[[kv_namespaces]]
binding = "NOTICIAS_KV"
id = "REEMPLAZAR_CON_ID_REAL"

[triggers]
crons = ["*/30 * * * *"]
